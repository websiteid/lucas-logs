<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin │ free</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ========== Reset & Base Styles ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background: linear-gradient(160deg, #f5f5f7, #e0e0e5);
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ========== Login Card ========== */
        .login-container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: slideIn 0.8s ease-out;
            z-index: 2;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container h2 {
            font-size: 2rem;
            margin-bottom: 25px;
            font-weight: 700;
            color: #111;
        }

        /* ========== Forms & Inputs ========== */
        .login-container input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
        }

        .login-container input:focus {
            border-color: #007aff;
            box-shadow: 0 0 15px rgba(0,122,255,0.4);
            outline: none;
            background: #fff;
        }

        .login-container button {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: #fff;
            font-weight: 700;
            background: linear-gradient(145deg, #007aff, #00c6ff);
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.3);
            margin-bottom: 15px;
        }

        .login-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 122, 255, 0.4);
        }

        .btn-back {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 0.95rem;
            text-decoration: none;
            color: #555;
            font-weight: 600;
            border: 1.5px solid #ccc;
            border-radius: 30px;
            background: transparent;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: rgba(0, 0, 0, 0.05);
            color: #111;
            border-color: #999;
        }

        /* ========== Notification System ========== */
        .blur-overlay {
            position: fixed;
            inset: 0;
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            transition: 0.4s ease;
            z-index: 5;
        }

        .blur-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 25px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 280px;
            opacity: 0;
            visibility: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        .notification.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .notification .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }

        .notification.success .icon-box { 
            background: rgba(0, 255, 136, 0.2); 
            color: #00ff88; 
            border: 2px solid #00ff88; 
        }

        .notification.error .icon-box { 
            background: rgba(255, 69, 58, 0.2); 
            color: #ff453a; 
            border: 2px solid #ff453a; 
        }

        .notification .msg {
            color: #fff;
            font-weight: 600;
            font-size: 1.1rem;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        /* ========== Progress Bar ========== */
        .notif-progress-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
        }

        .notif-progress-bar {
            height: 100%;
            width: 100%;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            transform: scaleX(0);
            transform-origin: left;
        }

        .show .notif-progress-bar {
            animation: progressAnim 2.5s linear forwards;
        }

        @keyframes progressAnim {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            color: #555;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="blur-overlay" id="blur"></div>

    <div class="notification" id="notification">
        <div class="icon-box" id="notifIcon"></div>
        <div class="msg" id="notifMessage"></div>
        <div class="notif-progress-bg">
            <div class="notif-progress-bar"></div>
        </div>
    </div>

    <div class="login-container">
        <h2>LOGIN │ free</h2>
        <form id="loginForm" onsubmit="return validateLogin(event)">
            <input type="text" id="username" placeholder="Username" required autocomplete="off" />
            <input type="password" id="password" placeholder="Password" required />
            <button type="submit">Login</button>
            <a href="dashboard.html" class="btn-back">Kembali</a>
        </form>
    </div>

    <footer class="footer">
        &copy; 2026 @nipo. All rights reserved.
    </footer>

    <script>
        function validateLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === "operator" && password === "12345") {
                localStorage.setItem('isLoggedIn', 'true');
                showNotification('Login Berhasil!', 'success');
                
                setTimeout(() => {
                    window.location.href = "admin-free.html"; 
                }, 2500);
            } else {
                showNotification('Username atau Password Salah!', 'error');
            }
            return false;
        }

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            const blur = document.getElementById('blur');
            const icon = document.getElementById('notifIcon');
            const msg = document.getElementById('notifMessage');

            icon.innerHTML = type === 'success' ? '✓' : '✕';
            msg.innerText = message;
            
            notification.className = "notification show " + type;
            blur.classList.add("active");

            setTimeout(() => {
                notification.classList.remove("show");
                blur.classList.remove("active");
            }, 2500);
        }

        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = "admin-free-dashboard.html";
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 83)) return false; 
            if (e.keyCode === 123) return false;
        };
    </script>

</body>
</html>
