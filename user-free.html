<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User │ Free</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.05);
            --radius-lg: 24px;
            --radius-md: 16px;
            --danger: #ef4444;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            background-image: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.05) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.03) 0px, transparent 50%);
        }

        .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

        /* TOP BAR & NAV */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; gap: 15px; }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-section img { width: 35px; height: 35px; border-radius: 8px; }

        .home-btn {
            background: white; border: 1px solid var(--border);
            padding: 10px; border-radius: 12px; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center;
            text-decoration: none; color: var(--text-main); font-weight: 600;
        }
        .home-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
        .home-btn svg { width: 22px; height: 22px; stroke: var(--primary); fill: none; stroke-width: 2; }

        h1, h2, h3, .menu-box span { font-family: 'Plus Jakarta Sans', sans-serif; }
        .header-nav { text-align: center; margin-bottom: 50px; }
        #dashboardTitle { font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; letter-spacing: -0.04em; margin-bottom: 8px; }

        /* MENU CATEGORY GRID */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .menu-box {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 35px 15px; border-radius: var(--radius-lg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: var(--shadow-sm);
        }
        .menu-box:hover { transform: translateY(-6px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(37, 99, 235, 0.08); }

        .icon-wrapper {
            width: 55px; height: 55px; background: var(--primary-light);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; transition: 0.3s;
        }
        .menu-box:hover .icon-wrapper { background: var(--primary); transform: scale(1.1); }
        .menu-box:hover .icon-wrapper svg { stroke: #ffffff; }
        .icon-wrapper svg { width: 26px; height: 26px; stroke: var(--primary); stroke-width: 2; fill: none; }
        .menu-box span { font-weight: 700; font-size: 1rem; }

        /* SEARCH & CONTROLS */
        .controls { display: none; margin-bottom: 30px; justify-content: center; }
        .search-container { width: 100%; max-width: 500px; }
        .search-container input {
            width: 100%; padding: 14px 24px; border-radius: 100px;
            border: 1px solid var(--border); outline: none; transition: 0.3s;
            box-shadow: var(--shadow-sm);
        }
        .search-container input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        /* POST LIST GRID */
        .post-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .post-item {
            background: var(--card-bg); border-radius: var(--radius-md);
            overflow: hidden; border: 1px solid var(--border);
            transition: 0.3s; cursor: pointer;
        }
        .post-item:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
        .post-thumbnail { width: 100%; aspect-ratio: 16/10; object-fit: cover; }
        .post-info { padding: 15px; }
        .play-tag { color: var(--primary); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .post-title { font-weight: 700; font-size: 1rem; line-height: 1.4; }

        /* QUICK PREVIEW (MINI TAP) OVERLAY */
        .quick-preview-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px); z-index: 8000; display: none;
            flex-direction: column; padding: 20px; overflow-y: auto;
        }
        .qp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; color: white; max-width: 1200px; margin-inline: auto; width: 100%; }
        
        /* GRID 5 KOLOM PREVIEW */
        .qp-grid {
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px; margin-bottom: 40px; max-width: 1200px; margin-inline: auto; width: 100%;
        }

        .qp-item-card { 
            background: #111; border-radius: 16px; overflow: hidden; 
            display: flex; flex-direction: column; border: 1px solid #333;
            transition: 0.3s; 
        }
        .qp-item-card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .qp-video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .qp-video-wrapper iframe { width: 100%; height: 100%; border: none; }

        .qp-item-footer { padding: 12px; background: #111; border-top: 1px solid #222; }
        
        .btn-item-detail {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 800;
            cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-item-detail:hover { background: #1d4ed8; filter: brightness(1.2); }

        footer { text-align: center; padding: 40px 0; color: var(--text-dim); font-size: 0.8rem; }

        /* RESPONSIVE GRID PREVIEW */
        @media (max-width: 1100px) { .qp-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) {
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
            #dashboardTitle { font-size: 2.2rem; }
            .qp-grid { grid-template-columns: repeat(2, 1fr); }
            .qp-header h2 { font-size: 1rem; max-width: 70%; }
        }

        /* ANIMATION */
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="quick-preview-overlay" id="qpOverlay">
    <div class="qp-header">
        <h2 id="qpTitle" style="font-family: 'Plus Jakarta Sans';">Preview</h2>
        <button onclick="closeQP()" style="background:var(--danger); border:none; color:white; padding:10px 20px; border-radius:12px; cursor:pointer; font-weight:800; font-size: 0.8rem;">BATAL / TUTUP</button>
    </div>
    
    <div class="qp-grid" id="qpGrid"></div>
</div>

<div class="dashboard-container">
    <div class="top-bar">
        <div class="nav-left">
            <a href="javascript:void(0)" class="home-btn" id="homeLink" onclick="handleBackAction()">
                <svg viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
            </a>
        </div>
        <div class="logo-section">
            <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
            <span style="font-weight: 800; font-size: 1.1rem; letter-spacing: -1px;">LUCA'S VIP</span>
        </div>
    </div>

    <div class="header-nav">
        <h1 id="dashboardTitle">LUCA'S</h1>
        <p id="subTitle" style="color: var(--text-dim); font-weight: 500;">Pilih kategori untuk melihat koleksi terbaru</p>
    </div>

    <div class="controls" id="controlsArea">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari judul video..." onkeyup="searchPosts()">
        </div>
    </div>

    <div class="menu-grid" id="categoryBoxes">
        <div class="menu-box" onclick="filterPosts('A')">
           <div class="icon-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg></div>
            <span>LOKAL</span>
        </div>
        <div class="menu-box" onclick="filterPosts('B')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg></div>
            <span>ASIA</span>
        </div>
        <div class="menu-box" onclick="filterPosts('C')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg></div>
            <span>CHINA</span>
        </div>
        <div class="menu-box" onclick="filterPosts('D')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg></div>
            <span>AMERIKA</span>
        </div>
        <div class="menu-box" onclick="filterPosts('E')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg></div>
            <span>VGK</span>
        </div>
        <div class="menu-box" onclick="filterPosts('F')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg></div>
            <span>YAOI</span>
        </div>
    </div>

    <div class="post-list" id="postList"></div>
</div>

<footer>&copy; 2026 @nipo. All rights reserved.</footer>

<script>
        let posts = [];
const JSON_URL = "https://raw.githubusercontent.com/websiteid/lucas-logs/main/database-free.json";
    let currentCategory = null;
    let lastDataHash = localStorage.getItem('user_home_db'); // Untuk deteksi perubahan otomatis

    async function loadPosts(){
    try {
        // Menambahkan parameter ?t= agar URL selalu dianggap baru oleh browser
        const cacheBuster = `?t=${new Date().getTime()}`; 
        const res = await fetch(JSON_URL + cacheBuster);
        
        const data = await res.json();
        posts = data.posts.reverse();
        console.log("Posts loaded from live source!");
    } catch(err) {
        console.error("Failed load posts", err);
    }
}

    // Filter Kategori (Fungsi 100% sama)
    function filterPosts(category) {
        currentCategory = category;
        gsap.to("#categoryBoxes, #subTitle", { duration: 0.3, opacity: 0, y: -20, display: 'none' });
        setTimeout(() => {
            document.getElementById('controlsArea').style.display = 'flex';
            document.getElementById('dashboardTitle').textContent = category.toUpperCase();
            renderPosts(posts.filter(p => p.category.toUpperCase() === category.toUpperCase()));
            gsap.fromTo("#controlsArea, #postList", { opacity: 0, y: 15 }, { opacity: 1, y: 0, duration: 0.4 });
        }, 300);
    }

    // Render Postingan
    function renderPosts(array) {
        const list = document.getElementById('postList');
        list.innerHTML = array.length ? '' : '<div style="grid-column:1/-1; text-align:center; padding:80px; color:var(--text-dim)">Belum ada konten di kategori ini.</div>';
        
        array.forEach((post, index) => {
            const item = document.createElement('div');
            item.className = 'post-item fade-in';
            item.style.animationDelay = `${index * 0.05}s`;
            item.innerHTML = `
                <img src="${post.image || ''}" class="post-thumbnail">
                <div class="post-info">
                    <span class="play-tag">Server Active</span>
                    <span class="post-title">${post.title}</span>
                </div>`;
            item.onclick = () => openQP(post);
            list.appendChild(item);
        });
    }

    // FUNGSI MINI TAP (MODIFIED: Per kotak ada tombolnya)
    function openQP(post) {
        const qpGrid = document.getElementById('qpGrid');
        qpGrid.innerHTML = '';
        document.getElementById('qpTitle').textContent = post.title;
        
        if (post.links && post.links.length > 0) {
            post.links.forEach((link, index) => {
                const card = document.createElement('div');
                card.className = 'qp-item-card fade-in';
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="qp-video-wrapper">
                        <iframe src="${link}" scrolling="no" allowfullscreen></iframe>
                    </div>
                    <div class="qp-item-footer">
                        <button class="btn-item-detail" onclick="window.open('${link}', '_blank')">
                            LIHAT DETAIL ${index + 1}
                        </button>
                    </div>
                `;
                qpGrid.appendChild(card);
            });
        }

        document.getElementById('qpOverlay').style.display = 'flex';
        gsap.fromTo("#qpOverlay", {opacity: 0}, {opacity: 1, duration: 0.4});
    }

    function closeQP() { 
        gsap.to("#qpOverlay", {opacity: 0, duration: 0.3, onComplete: () => {
            document.getElementById('qpOverlay').style.display = 'none';
            document.getElementById('qpGrid').innerHTML = ''; // Reset iframe agar suara hilang
        }});
    }

    function searchPosts() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        renderPosts(posts.filter(p => p.category.toUpperCase() === currentCategory.toUpperCase() && p.title.toLowerCase().includes(val)));
    }

    // Tombol Back (Fungsi 100% sama)
    function handleBackAction() {
        if (currentCategory) {
            currentCategory = null;
            gsap.to("#postList, #controlsArea", { 
                duration: 0.3, opacity: 0, y: 10, 
                onComplete: () => {
                    document.getElementById('postList').innerHTML = '';
                    document.getElementById('controlsArea').style.display = 'none';
                    document.getElementById('dashboardTitle').textContent = "LUCA'S";
                    document.getElementById('categoryBoxes').style.display = 'grid';
                    document.getElementById('subTitle').style.display = 'block';
                    gsap.fromTo("#categoryBoxes, #subTitle", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.4 });
                }
            });
        } else { window.location.href = 'user.html'; }
    }

    window.onload = loadPosts;

    // Storage Listener (100% Sync)
    window.addEventListener('storage', (e) => {
        if (e.key === 'user_home_db') {
            posts = (JSON.parse(e.newValue) || []).reverse();
            if (currentCategory) {
                renderPosts(posts.filter(p => p.category.toUpperCase() === currentCategory.toUpperCase()));
            }
        }
    });
</script>
</body>
</html>
