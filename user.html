<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background: linear-gradient(160deg, #f5f5f7, #e0e0e5);
            color: #111;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* --- SIDEBAR & OVERLAY --- */
                .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 4px 0 40px rgba(0, 0, 0, 0.1);
            padding: 100px 25px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 30px;
            transform: translateX(-100%);
            opacity: 0;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        .sidebar.active {
            transform: translateX(0);
            opacity: 1;
        }

        .sidebar a {
            color: #111;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.2rem;
            padding: 10px;
            border-radius: 12px;
            transition: background 0.3s ease, transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: inherit;
            
        }

        .sidebar a:hover {
            background: rgba(0, 0, 0, 0.05);
            transform: translateX(10px);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 90;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .hamburger {
            position: fixed;
            top: 25px;
            left: 25px;
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            z-index: 101;
        }

        .hamburger div {
            width: 32px;
            height: 4px;
            background: #111;
            margin: 5px 0;
            border-radius: 2px;
            transition: transform 0.3s ease, background 0.3s ease;
        }
        .hamburger.active div:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
        }

        .hamburger.active div:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active div:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }
        /* --- MAIN CONTENT --- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
            animation: fadeSlide 1s ease forwards;
        }

        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .center-content {
            margin-top: 50px;
            margin-bottom: 20px;
        }

        .logo {
            max-width: 180px;
            height: auto;
        }

        .main h1 { font-size: 2.5rem; margin-bottom: 10px; }

        .user-options {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 600px;
            margin-top: 30px;
        }

        .user-options button {
            flex: 1;
            min-width: 250px;
            padding: 18px;
            font-size: 1.1rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        #freeUserBtn { background: linear-gradient(145deg, #007aff, #0056b3); }
        #vipUserBtn { background: linear-gradient(145deg, #ff9500, #cc7a00); }

        .user-options button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        /* --- CUSTOM MODAL (PASSWORD & NOTIF) --- */
        #vipModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-content h2 { margin-bottom: 15px; font-size: 1.5rem; color: #333; }
        
        .modal-content input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        .modal-content input:focus { border-color: #ff9500; box-shadow: 0 0 10px rgba(255, 149, 0, 0.2); }

        .modal-btns { display: flex; gap: 10px; }
        
        .btn-action {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-confirm { background: #ff9500; color: white; }
        .btn-cancel { background: #eee; color: #333; }
        .btn-buy { background: #0088cc; color: white; margin-top: 10px; width: 100%; }

        footer {
            padding: 20px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            font-size: 0.9rem;
        }

        @media(max-width: 600px) {
            .main h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <a href="dashboard.html">🏡 Home</a>
    <a href="buy.html">💵 Beli VIP</a>
    <a href="user.html">👥 User</a>
    <a href="admin.html">👤 Admin</a>
    <a href="help.html">❓ Help</a>
    <a href="support.html">💬 Support</a>
</div>

<div class="overlay" id="overlay"></div>

<div class="hamburger" id="hamburger">
    <div></div><div></div><div></div>
</div>

<div class="center-content">
    <center><img src="logo.png" alt="Logo" class="logo"></center>
</div>

<div class="main">
    <h1>Welcome, User!</h1>
    <p>Pilih tipe akun untuk melanjutkan akses fitur.</p>

    <div class="user-options">
        <button id="freeUserBtn" onclick="window.location.href='user-free.html'">Free User</button>
        <button id="vipUserBtn" onclick="openVipModal()">🔒 VIP User</button>
    </div>
</div>

<div id="vipModal">
    <div class="modal-content" id="modalBox">
        </div>
</div>

<footer>
    &copy; 2026 @nipo. All rights reserved.
</footer>

<script>
const sidebar = document.getElementById('sidebar');
    const hamburger = document.getElementById('hamburger');
    const overlay = document.getElementById('overlay');

    hamburger.addEventListener('click', () => {
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    });

    if (performance.getEntriesByType("navigation")[0].type === "reload") {
        sessionStorage.setItem('last_page', window.location.href);
        window.location.href = 'loading.html';
    }
    
    overlay.addEventListener('click', () => {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
    });
    document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = function(e) {
    if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 73)) return false; 
    if (e.keyCode === 123) return false;
};

    function openVipModal() {
        vipModal.style.display = 'flex';
        showPasswordInput();
    }

    function closeModal() {
        vipModal.style.display = 'none';
    }

    function showPasswordInput() {
        modalBox.innerHTML = `
            <h2>🔒 Verifikasi VIP</h2>
            <p style="margin-bottom:15px; color:#666;">Masukkan password khusus VIP</p>
            <input type="password" id="vipPassInput" placeholder="Ketik Password Disini...">
            <div class="modal-btns">
                <button class="btn-action btn-cancel" onclick="closeModal()">Batal</button>
                <button class="btn-action btn-confirm" onclick="verifyPassword()">Masuk</button>
            </div>
        `;
        document.getElementById('vipPassInput').focus();
    }

    function verifyPassword() {
        const input = document.getElementById('vipPassInput').value;
        if (input === "yang beli-beli saja") {
            modalBox.innerHTML = `
                <h2 style="color:#28a745;">✅ Berhasil!</h2>
                <p>Password benar. Mengalihkan ke halaman VIP...</p>
            `;
            setTimeout(() => { window.location.href = 'user-vip.html'; }, 1500);
        } else {
            showErrorNotif();
        }
    }

    function showErrorNotif() {
        modalBox.innerHTML = `
            <h2 style="color:#d9534f;">❌ Password Salah!</h2>
            <p style="color:#666; margin-bottom:10px;">Akses ini hanya untuk member resmi.</p>
            <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
            <p style="font-weight:600;">Ingin mengakses? Beli ke bot:</p>
            <button class="btn-action btn-buy" onclick="window.location.href='https://t.me/vvip_3_bot'">
                Beli via Telegram @vvip_3_bot
            </button>
            <button class="btn-action btn-cancel" style="width:100%; margin-top:10px;" onclick="showPasswordInput()">Coba Lagi</button>
        `;
    }

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode === 123 || (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 73 || e.keyCode === 74))) return false;
    };

    if (performance.getEntriesByType("navigation")[0].type === "reload") {
        window.location.href = 'loading.html';
    }
</script>

</body>
</html>
