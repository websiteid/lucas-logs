<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f7;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .glass-card {
            position: relative;
            padding: 40px;
            width: 300px;
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            animation: entrance 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .loading-text {
            font-size: 13px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 16px;
            display: block;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #e5e5ea;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #007AFF, #5856D6);
            border-radius: 10px;
            animation: loadProgress 1s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes loadProgress {
            to { width: 100%; }
        }

        @keyframes entrance {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes fadeExit {
            to { opacity: 0; transform: scale(1.05); filter: blur(15px); }
        }

        .fade-out {
            animation: fadeExit 0.5s ease-in forwards;
        }
    </style>
</head>
<body>

<div class="glass-card" id="loadingScreen">
    <span class="loading-text">Loading</span>
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
</div>

<script>
    setTimeout(() => {
        const screen = document.getElementById("loadingScreen");
        screen.classList.add("fade-out");
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 500);
    }, 1000);
</script>

</body>
</html>
