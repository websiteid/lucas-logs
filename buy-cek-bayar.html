<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembayaran QRIS</title>
<link rel="icon" href="logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #007aff;
    --bg-gradient: linear-gradient(135deg, #f0f7ff 0%, #e0f2fe 100%);
    --text-main: #1e293b;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
body { background: var(--bg-gradient); min-height:100vh; width:100%; display:flex; align-items:center; justify-content:center; padding:20px; }
.box { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); padding:30px; border-radius:32px; width:100%; max-width:450px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.1); border:1px solid rgba(255,255,255,0.5); animation: fadeIn 0.8s ease-out; }
.modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display:none; align-items:center; justify-content:center; z-index:9999; }
.modal-content { background:white; padding:30px; border-radius:24px; text-align:center; max-width:300px; width:90%; animation: popUp 0.4s ease; }
@keyframes popUp { from { transform: scale(0.8); opacity:0; } to { transform: scale(1); opacity:1; } }
.spinner { width:40px; height:40px; border:4px solid #f3f3f3; border-top:4px solid var(--primary); border-radius:50%; animation: spin 1s linear infinite; margin:0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
.qris-container { width:250px; height:330px; margin:15px auto; padding:10px; background:white; border-radius:20px; border:1px solid #e2e8f0; transition: transform 0.3s ease; }
.qris-container:hover { transform: scale(1.03); }
.qris-img { width:100%; height:100%; border-radius:12px; object-fit:cover; }
.upload-section { margin:15px 0; padding:15px; border:2px dashed #cbd5e1; border-radius:16px; background: rgba(255,255,255,0.5); }
input[type="file"] { width:100%; font-size:0.8rem; }
button { background: var(--primary); color:#fff; border:none; padding:16px; border-radius:16px; font-weight:700; cursor:pointer; width:100%; margin-top:10px; transition:0.3s; }
button:hover { background:#005bb5; transform:scale(1.02); }
button:active { transform:scale(0.95); }
.btn-secondary { background:#e2e8f0; color:#475569; }
h2, .nominal, #timer { animation: slideUp 0.6s ease-out; }
.nominal { color: var(--primary); font-size:2rem; font-weight:800; margin:5px 0; }
#timer { font-weight:800; color:#e11d48; background:#fff1f2; padding:5px 15px; border-radius:8px; display:inline-block; margin-bottom:10px; animation: pulse 2s infinite; }
.warning-text { color:#e11d48; font-size:0.75rem; font-weight:600; margin-top:8px; }
#btnKonfirmasi { display:none; }
@keyframes fadeIn { from { opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }
@keyframes slideUp { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }
@keyframes pulse { 0% { transform:scale(1);} 50% { transform:scale(1.05);} 100% { transform:scale(1);} }
</style>
</head>
<body>

<div id="modalNotif" class="modal-overlay">
    <div class="modal-content">
        <div id="spinnerIcon" class="spinner"></div>
        <h3 id="modalTitle">Memproses...</h3>
        <p id="modalDesc" style="color:#64748b; margin-top:10px;">Mohon tunggu sebentar.</p>
    </div>
</div>

<div class="box">
    <h2>Scan QRIS</h2>
    <div id="timer">10:00</div>
    <div class="qris-container"><img src="qris.jpeg" alt="QRIS Code" class="qris-img"></div>
    <div class="nominal" id="displayHarga">Rp -</div>
    <p style="color:#64748b; margin-bottom:10px;">Produk: <strong id="displayProduk">-</strong></p>
    <p id="displayLink" style="display:none;"></p>

    <div class="upload-section">
        <p style="font-size:0.85rem; margin-bottom:8px;"><strong>Wajib:</strong> Unggah Bukti Transfer</p>
        <input type="file" id="inputBukti" accept="image/*" onchange="validasiFile()">
        <img id="previewBukti" style="display:none; width:100px; height:100px; object-fit:cover; border-radius:10px; margin-top:10px; border:1px solid #ddd;">
        <p id="notifUpload" class="warning-text">Tombol konfirmasi muncul setelah upload.</p>
    </div>

    <button id="btnKonfirmasi" onclick="konfirmasiAdmin()">Konfirmasi ke Admin</button>
    <button class="btn-secondary" onclick="batalPesanan()">Batal</button>
</div>

<script>
// 1. Masukkan URL Web App Google Script Anda di sini
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-Bi0L0a2y-hhEdA-pNa4Wiv1XNyokHBvRrsodKjsdvVix97QDnf0Db3e7vWPuEeWezg/exec"; 

let database = {};

async function loadDatabase() {
    try {
        // 2. Ambil data dari Google Sheets (bukan file JSON)
        const res = await fetch(SCRIPT_URL);
        database = await res.json();

        const params = new URLSearchParams(window.location.search);
        const produk = params.get('produk') || "Produk";
        const harga = params.get('harga') || "0";

        // 3. Cari link berdasarkan nama produk di Google Sheets
        let linkAkses = database[produk];

        // Logika tambahan: Jika produk tidak ditemukan, coba cari yang mengandung kata "PAKET"
        if (!linkAkses) {
            const kunciPaket = Object.keys(database).find(k => k.toUpperCase().includes("PAKET"));
            linkAkses = database[kunciPaket] || "Link belum diatur di Google Sheets";
        }

        document.getElementById('displayProduk').innerText = produk;
        document.getElementById('displayHarga').innerText = "Rp " + harga;
        document.getElementById('displayLink').innerText = linkAkses;

        startTimer();
    } catch(err) {
        console.error("Gagal load database dari Google Sheets", err);
        alert("Gagal mengambil data produk. Pastikan URL Script benar.");
    }
}

function startTimer() {
    let targetTime = Date.now() + (10*60*1000); // 10 menit
    const countdown = setInterval(() => {
        const now = Date.now();
        const timeLeft = Math.floor((targetTime - now)/1000);
        if (timeLeft <= 0) {
            clearInterval(countdown);
            alert("Waktu pembayaran telah habis!");
            window.location.href = "buy.html";
        } else {
            const m = Math.floor(timeLeft/60);
            const s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
        }
    },1000);
}

function showModal(title, desc, showSpinner=true) {
    const modal = document.getElementById('modalNotif');
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalDesc').innerText = desc;
    document.getElementById('spinnerIcon').style.display = showSpinner?'block':'none';
    modal.style.display = 'flex';
}

function validasiFile() {
    const fileInput = document.getElementById('inputBukti');
    const btnKonfirmasi = document.getElementById('btnKonfirmasi');
    const preview = document.getElementById('previewBukti');

    if(fileInput.files && fileInput.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e){
            preview.src = e.target.result;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(fileInput.files[0]);
        btnKonfirmasi.style.display = 'block';
    } else {
        preview.style.display = 'none';
        btnKonfirmasi.style.display = 'none';
    }
}

async function konfirmasiAdmin() {
    const file = document.getElementById('inputBukti').files[0];
    if(!file) return;

    showModal("Mengunggah...", "Sedang memproses bukti transfer...");

    const apiKey = "1759a8182bbe073e73a30127af928739";
    const formData = new FormData();
    formData.append("image", file);

    try {
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
            method:"POST",
            body: formData
        });
        const data = await response.json();

        if(data.success) {
            const produk = document.getElementById('displayProduk').innerText;
            const harga = document.getElementById('displayHarga').innerText.replace('Rp ','');
            const rawLinks = document.getElementById('displayLink').innerText;
            const formattedLinks = rawLinks.includes(',') 
                ? rawLinks.split(',').map((l,i)=>`${i+1}. ${l.trim()}`).join('%0A')
                : rawLinks;

            const pesan = `KONFIRMASI PEMBAYARAN%0A`+
                          `Produk : ${produk}%0A`+
                          `Nominal: Rp ${harga}%0A`+
                          `Link   :${rawLinks.includes(',')?'%0A':''}${formattedLinks}%0A%0A`+
                          `Bukti  : ${data.data.url}`;

            window.location.href = `https://t.me/jnipo?text=${pesan}`;
        } else {
            throw new Error("Upload gagal");
        }
    } catch(error) {
        showModal("Gagal","Kesalahan saat upload.",false);
        setTimeout(()=>{document.getElementById('modalNotif').style.display='none';},2000);
    }
}

function batalPesanan() {
    showModal("Membatalkan...","Kembali ke menu...");
    setTimeout(()=>{window.location.href='buy.html';},1000);
}

// Load database saat halaman siap
loadDatabase();
</script>

</body>
</html>
