<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User │ VIP Access</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.05);
            --radius-lg: 24px;
            --radius-md: 16px;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; line-height: 1.6;
            background-image: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.05) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.03) 0px, transparent 50%);
            overflow-x: hidden;
        }

        .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

        /* TOP BAR */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; gap: 15px; }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-section img { width: 35px; height: 35px; border-radius: 8px; }

        .home-btn {
            background: white; border: 1px solid var(--border);
            padding: 10px; border-radius: 12px; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center;
            text-decoration: none; color: var(--text-main); font-weight: 600;
        }
        .home-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
        .home-btn svg { width: 22px; height: 22px; stroke: var(--primary); fill: none; stroke-width: 2.5; }

        .header-nav { text-align: center; margin-bottom: 50px; }
        #dashboardTitle { font-family: 'Plus Jakarta Sans', sans-serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; letter-spacing: -0.04em; margin-bottom: 8px; }

        /* TOKEN GATE */
        #tokenGate {
            display: none; max-width: 400px; margin: 0 auto 40px; text-align: center;
            background: white; padding: 30px; border-radius: var(--radius-lg);
            border: 1px solid var(--border); box-shadow: var(--shadow-md);
        }
        .token-input {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--border);
            font-size: 1.1rem; text-align: center; font-weight: 700; letter-spacing: 4px;
            margin: 15px 0; outline: none; transition: 0.3s;
        }
        .token-input:focus { border-color: var(--primary); }
        .btn-verify {
            width: 100%; padding: 15px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-verify:hover { background: #1d4ed8; transform: scale(1.02); }
        #tokenError { color: var(--danger); font-size: 0.85rem; font-weight: 600; margin-top: 10px; display: none; }

        /* MENU GRID */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .menu-box {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 35px 15px; border-radius: var(--radius-lg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: var(--shadow-sm);
        }
        .menu-box:hover { transform: translateY(-6px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(37, 99, 235, 0.08); }
        .icon-wrapper { width: 55px; height: 55px; background: var(--primary-light); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; transition: 0.3s; }
        .menu-box:hover .icon-wrapper { background: var(--primary); }
        .menu-box:hover .icon-wrapper svg { stroke: #ffffff; }
        .icon-wrapper svg { width: 26px; height: 26px; stroke: var(--primary); stroke-width: 2; fill: none; }
        .menu-box span { font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif; }

        /* POST AREA */
        .controls { display: none; margin-bottom: 30px; justify-content: center; }
        .search-container { width: 100%; max-width: 500px; }
        .search-container input { width: 100%; padding: 14px 24px; border-radius: 100px; border: 1px solid var(--border); outline: none; box-shadow: var(--shadow-sm); transition: 0.3s; }
        .search-container input:focus { border-color: var(--primary); }
        
        .post-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .post-item { background: var(--card-bg); border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; }
        .post-item:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
        .post-thumbnail { width: 100%; aspect-ratio: 16/10; object-fit: cover; }
        .post-info { padding: 15px; }
        .play-tag { color: var(--primary); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .post-title { font-weight: 700; font-size: 1rem; line-height: 1.4; }

        /* QUICK PREVIEW OVERLAY (SAMA DENGAN FREE) */
        .qp-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px); z-index: 9000; display: none;
            flex-direction: column; padding: 20px; overflow-y: auto;
        }
        .qp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; color: white; max-width: 1200px; margin-inline: auto; width: 100%; }
        
        .qp-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); 
            gap: 15px; margin-bottom: 40px; max-width: 1200px; margin-inline: auto; width: 100%;
        }

        .qp-card { 
            background: #111; border-radius: 16px; overflow: hidden; 
            display: flex; flex-direction: column; border: 1px solid #333;
            transition: 0.3s; 
        }
        .qp-card:hover { border-color: var(--primary); transform: translateY(-4px); }
        
        .qp-video { width: 100%; aspect-ratio: 16/9; background: #000; }
        .qp-video iframe { width: 100%; height: 100%; border: none; }

        .qp-footer { padding: 12px; background: #111; }
        .btn-detail {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 800;
            cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn-detail:hover { filter: brightness(1.2); }

        footer { text-align: center; padding: 40px 0; color: var(--text-dim); font-size: 0.8rem; }

        @media (max-width: 1100px) { .qp-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) {
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
            #dashboardTitle { font-size: 2.2rem; }
            .qp-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="qp-overlay" id="qpOverlay">
    <div class="qp-header">
        <h2 id="qpTitle" style="font-family: 'Plus Jakarta Sans';">VIP Preview</h2>
        <button onclick="closeQP()" style="background:var(--danger); border:none; color:white; padding:10px 20px; border-radius:12px; cursor:pointer; font-weight:800; font-size: 0.8rem;">TUTUP</button>
    </div>
    <div class="qp-grid" id="qpGrid"></div>
</div>

<div class="dashboard-container">
    <div class="top-bar">
        <div class="nav-left">
            <a href="javascript:void(0)" class="home-btn" onclick="handleBackAction()">
                <svg viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
            </a>
        </div>
        <div class="logo-section">
            <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
            <span style="font-weight: 800; font-size: 1.1rem; letter-spacing: -1px;">LUCA'S VIP</span>
        </div>
    </div>

    <div class="header-nav">
        <h1 id="dashboardTitle">VIP ACCESS</h1>
        <p id="subTitle" style="color: var(--text-dim); font-weight: 500;">Pilih kategori kelas eksklusif</p>
    </div>

    <div id="tokenGate">
        <h3 id="targetClassTitle" style="font-family: 'Plus Jakarta Sans'; margin-bottom: 5px;">Akses Kelas</h3>
        <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px;">Masukkan token untuk membuka kategori</p>
        <input type="text" id="tokenInput" class="token-input" placeholder="••••" maxlength="12">
        <button class="btn-verify" onclick="verifyToken()">BUKA AKSES</button>
        <div id="tokenError">Token Salah! Periksa kembali.</div>
    </div>

    <div class="menu-grid" id="categoryBoxes">
        <div class="menu-box" onclick="requestAccess('A', 'LOKAL')">
           <div class="icon-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg></div>
            <span>LOKAL A</span>
        </div>
        <div class="menu-box" onclick="requestAccess('B', 'ASIA')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg></div>
            <span>ASIA B</span>
        </div>
        <div class="menu-box" onclick="requestAccess('C', 'CHINA')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg></div>
            <span>CHINA C</span>
        </div>
        <div class="menu-box" onclick="requestAccess('D', 'AMERIKA')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg></div>
            <span>AMERIKA D</span>
        </div>
        <div class="menu-box" onclick="requestAccess('E', 'VGK')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg></div>
            <span>VGK E</span>
        </div>
        <div class="menu-box" onclick="requestAccess('F', 'YAOI')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg></div>
            <span>YAOI F</span>
        </div>
    </div>

    <div class="controls" id="controlsArea">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari judul video..." onkeyup="searchPosts()">
        </div>
    </div>
    <div class="post-list" id="postList"></div>
</div>

<footer>&copy; 2026 @nipo. VIP Member Only.</footer>

<script>
// GANTI DENGAN URL WEB APP KAMU YANG DARI GOOGLE APPS SCRIPT
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw9P0UrBit2kDH1nHQrNWrA729IiloYxakjoCdnbamztvKkEGmJreMr8IMMY11M_RXn/exec"; 

let posts = [];
let tokens = {}; // Sekarang kita ambil dari Google Sheets
let currentCategory = null;
let categoryName = "";

// LOAD DATABASE DARI GOOGLE SHEETS
async function loadDatabase() {
    try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        
        // Simpan data postingan
        posts = data.posts || [];
        
        // Ubah format tokens dari array [{class, token}] menjadi object {A: "123", B: "456"}
        if (data.tokens) {
            data.tokens.forEach(item => {
                tokens[item.class.toUpperCase()] = item.token;
            });
        }
        console.log("Database Synced:", { posts, tokens });
    } catch (err) {
        console.error("Gagal sinkronisasi Database:", err);
    }
}

// Jalankan saat halaman dibuka
loadDatabase();

function requestAccess(cat, name){
    currentCategory = cat;
    categoryName = name;
    
    document.getElementById('targetClassTitle').innerText = `Akses Kelas ${cat}`;
    document.getElementById('tokenInput').value = "";
    document.getElementById('tokenError').style.display = 'none';

    gsap.to("#categoryBoxes, #subTitle", { duration:0.3, opacity:0, y:-20, display:'none', onComplete: ()=>{
        document.getElementById('tokenGate').style.display='block';
        gsap.fromTo("#tokenGate",{opacity:0, scale:0.9},{opacity:1, scale:1, duration:0.4});
    }});
}

function verifyToken(){
    const inputVal = document.getElementById('tokenInput').value.trim();
    // Ambil token dari data Google Sheets
    const correctToken = tokens[currentCategory.toUpperCase()];

    if(!correctToken || inputVal !== correctToken.toString()){
        const err = document.getElementById('tokenError');
        err.style.display='block';
        gsap.fromTo(err,{x:-10},{x:10, repeat:3, yoyo:true, duration:0.05});
        return;
    }
    
    gsap.to("#tokenGate",{duration:0.3, opacity:0, scale:0.8, display:'none', onComplete: ()=>{
        document.getElementById('controlsArea').style.display='flex';
        document.getElementById('dashboardTitle').textContent = categoryName;
        
        // Filter postingan berdasarkan kategori dari Sheet
        const filtered = posts.filter(p => p.category && p.category.toUpperCase() === currentCategory.toUpperCase());
        renderPosts(filtered);
        
        gsap.fromTo("#controlsArea, #postList",{opacity:0, y:15},{opacity:1, y:0, duration:0.4});
    }});
}

function renderPosts(array){
    const list = document.getElementById('postList');
    list.innerHTML = array.length ? '' : '<div style="grid-column:1/-1; text-align:center; padding:80px; color:var(--text-dim)">Belum ada konten di kelas ini.</div>';
    
    array.forEach((post, index) => {
        // Parsing links jika tersimpan sebagai string JSON di Sheet
        let parsedLinks = [];
        try {
            parsedLinks = typeof post.links === 'string' ? JSON.parse(post.links) : post.links;
        } catch(e) { parsedLinks = [post.links]; }

        const item = document.createElement('div');
        item.className='post-item fade-in';
        item.style.animationDelay = `${index*0.05}s`;
        item.innerHTML = `
            <img src="${post.image || 'https://via.placeholder.com/300x200'}" class="post-thumbnail">
            <div class="post-info">
                <span class="play-tag">VIP CONTENT</span>
                <span class="post-title">${post.title}</span>
            </div>`;
        item.onclick = () => openQP(post, parsedLinks);
        list.appendChild(item);
    });
}

function openQP(post, links) {
    const qpGrid = document.getElementById('qpGrid');
    qpGrid.innerHTML = '';
    document.getElementById('qpTitle').textContent = post.title;
    
    if (links && links.length > 0) {
        links.forEach((link, index) => {
            if(!link) return;
            const card = document.createElement('div');
            card.className = 'qp-card fade-in';
            card.style.animationDelay = `${index * 0.1}s`;
            card.innerHTML = `
                <div class="qp-video">
                    <iframe src="${link}" scrolling="no" allowfullscreen></iframe>
                </div>
                <div class="qp-footer">
                    <button class="btn-detail" onclick="window.open('${link}', '_blank')">
                        SERVER VIP ${index + 1}
                    </button>
                </div>`;
            qpGrid.appendChild(card);
        });
    }

    document.getElementById('qpOverlay').style.display = 'flex';
    gsap.fromTo("#qpOverlay", {opacity: 0}, {opacity: 1, duration: 0.4});
}

function closeQP() { 
    gsap.to("#qpOverlay", {opacity: 0, duration: 0.3, onComplete: () => {
        document.getElementById('qpOverlay').style.display = 'none';
        document.getElementById('qpGrid').innerHTML = ''; 
    }});
}

function handleBackAction() {
    if(currentCategory !== null || document.getElementById('tokenGate').style.display === 'block') {
        currentCategory = null;
        gsap.to("#postList, #controlsArea, #tokenGate",{duration:0.3, opacity:0, y:10, onComplete: ()=>{
            document.getElementById('postList').innerHTML='';
            document.getElementById('controlsArea').style.display='none';
            document.getElementById('tokenGate').style.display='none';
            document.getElementById('dashboardTitle').textContent="VIP ACCESS";
            document.getElementById('categoryBoxes').style.display='grid';
            document.getElementById('subTitle').style.display='block';
            gsap.fromTo("#categoryBoxes, #subTitle",{opacity:0, y:20},{opacity:1, y:0, duration:0.4});
        }});
    } else {
        window.history.back();
    }
}

function searchPosts(){
    const val = document.getElementById('searchInput').value.toLowerCase();
    const filtered = posts.filter(p=> 
        p.category && p.category.toUpperCase() === currentCategory.toUpperCase() && 
        p.title.toLowerCase().includes(val)
    );
    renderPosts(filtered);
}

// Security
document.addEventListener('contextmenu', e=>e.preventDefault());
document.onkeydown = function(e){ if(e.keyCode==123) return false; };
</script>
</body>
</html>
