<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - VIP</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #eef5ff, #ffffff); 
            color: #2d3436; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        
        .checkout-box { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 32px; 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0, 122, 255, 0.15);
            animation: floatUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Loading Overlay */
        #loadingOverlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 999; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid #007aff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes floatUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        
        h1 { color: #007aff; margin-bottom: 10px; font-weight: 800; }
        .product-info { margin: 25px 0; padding: 25px; background: #f8fbff; border: 2px solid #007aff; border-radius: 20px; }
        
        button { 
            background: #007aff; border: none; padding: 16px; border-radius: 16px; 
            font-weight: 700; cursor: pointer; color: white; width: 100%; margin-top: 15px;
            transition: all 0.3s ease;
        }
        button:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3); }
        .btn-back { background: #eee !important; color: #666 !important; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <h2 style="color: #007aff;">Memproses pesanan...</h2>
    </div>

    <div class="checkout-box">
        <h1>🛒 Checkout</h1>
        <p>Ringkasan pesanan Anda:</p>
        
        <div class="product-info">
            <h2 id="namaProduk" style="font-size: 1.2rem;">Memuat...</h2>
            <p style="font-size: 1.8rem; font-weight: 800; color: #007aff; margin-top: 10px;" id="hargaProduk">-</p>
        </div>

        <button onclick="prosesPembayaran()">
            <span>✅</span> Lanjutkan Pembayaran
        </button>
        <button class="btn-back" onclick="window.history.back()">Kembali</button>
    </div>

    <script>

    // Database Produk & Link Akses
    const databaseProduk = {
        "VIP LOKAL": "https://t.me/akses_lokal",
        "VIP ASIA": "https://t.me/akses_asia",
        "VIP CINA": "https://t.me/akses_cina",
        "VIP AMERIKA": "https://t.me/akses_amerika",
        "VIP VGK": "https://t.me/akses_vgk",
        "PAKET LENGKAP SEMUA CHANNEL": "https://t.me/akses_semua"
    };

    const params = new URLSearchParams(window.location.search);
    const nama = params.get('produk') || "Produk Tidak Ditemukan";
    const harga = params.get('harga') || "0";

    document.getElementById('namaProduk').innerText = nama;
    document.getElementById('hargaProduk').innerText = "Rp " + harga;

    function prosesPembayaran() {
        // Ambil link berdasarkan produk
        const linkAkses = databaseProduk[nama] || "Link Tidak Tersedia";
        
        // Simpan ke localStorage agar bisa dibaca di halaman pembayaran
        localStorage.setItem('userLink', linkAkses);
        
        document.getElementById('loadingOverlay').style.display = 'flex';
        setTimeout(() => {
            window.location.href = 'buy-cek-bayar.html?produk=' + encodeURIComponent(nama) + '&harga=' + encodeURIComponent(harga);
        }, 1500);
    }

    </script>
</body>
</html>
